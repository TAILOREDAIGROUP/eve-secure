version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eve-secure-postgres
    environment:
      POSTGRES_DB: eve_secure
      POSTGRES_USER: eve_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - eve-secure-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eve_user -d eve_secure"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: eve-secure-pgvector
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: eve_secure
      POSTGRES_USER: eve_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
    volumes:
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/02-pgvector.sql
    networks:
      - eve-secure-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eve-secure-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_password_change_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eve-secure-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    container_name: eve-secure-clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - eve-secure-net
    environment:
      CLAMAV_NO_STATS: "true"
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: eve-secure-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://eve_user:${DB_PASSWORD:-dev_password_change_me}@postgres:5432/eve_secure
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_password_change_me}@redis:6379
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_key_change_me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "3000:3000"
    volumes:
      - ../../src:/app/src
      - ../../node_modules:/app/node_modules
    networks:
      - eve-secure-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  eve-secure-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clamav_data:
